<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crop Recommendation System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #a8e063, #56ab2f);
      min-height: 100vh;
    }

    /* Navbar */
    .navbar {
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    /* Main Container */
    .container {
      background: #ffffff;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1s ease-in-out;
    }

    h1 {
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
    }

    label {
      font-weight: 600;
    }

    /* Input focus animation */
    .form-control:focus {
      border-color: #56ab2f;
      box-shadow: 0 0 10px rgba(86,171,47,0.5);
    }

    /* Button */
    .btn-custom {
      background: linear-gradient(135deg, #11998e, #38ef7d);
      border: none;
      padding: 12px 35px;
      font-size: 18px;
      font-weight: 600;
      border-radius: 30px;
      transition: all 0.4s ease;
    }

    .btn-custom:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    /* Result Card */
    .card {
      margin: 30px auto;
      text-align: center;
      border-radius: 20px;
      animation: slideUp 1s ease-in-out;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .card img {
      margin: 20px auto 0;
      animation: pulse 2s infinite;
    }

    .card-title {
      font-weight: 600;
    }

    .card-text {
      font-size: 20px;
      font-weight: 700;
      color: #38ef7d;
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(50px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">🌾 Crop Recommendation System</a>
  </div>
</nav>

<!-- Main Content -->
<div class="container my-5">
  <h1 class="text-success">Smart Crop Recommendation 🌱</h1>

  <form action="/predict" method="POST">
    <div class="row g-3">
      <div class="col-md-4">
        <label>Nitrogen</label>
        <input type="number" name="Nitrogen" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label>Phosphorus</label>
        <input type="number" name="Phosporus" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label>Potassium</label>
        <input type="number" name="Potassium" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label>Temperature (°C)</label>
        <input type="number" step="0.01" name="Temperature" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label>Humidity (%)</label>
        <input type="number" step="0.01" name="Humidity" class="form-control" required>
      </div>
      <div class="col-md-4">
        <label>pH</label>
        <input type="number" step="0.01" name="pH" class="form-control" required>
      </div>

      <div class="col-md-4">
        <label>Rainfall (mm)</label>
        <input type="number" step="0.01" name="Rainfall" class="form-control" required>
      </div>
    </div>

    <div class="text-center mt-4">
      <button type="submit" class="btn btn-custom">🌱 Get Recommendation</button>
    </div>
  </form>

  {% if result %}
  <div class="card bg-dark text-white" style="width: 20rem;">
    <img src="{{ url_for('static', filename='crop.png') }}" width="80">
    <div class="card-body">
      <h5 class="card-title">Recommended Crop</h5>
      <p class="card-text">{{ result }}</p>
    </div>
  </div>
  {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
